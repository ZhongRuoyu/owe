name: Release

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions: {}

defaults:
  run:
    shell: bash -euxo pipefail {0}

jobs:
  build:
    name: Build
    uses: ./.github/workflows/build.yml
    permissions:
      contents: read
    with:
      cache: false

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: release
      url: ${{ github.server_url }}/${{ github.repository }}/releases/tag/v${{ needs.build.outputs.version }}
    permissions:
      artifact-metadata: write # for generating build provenance
      attestations: write # for generating build provenance
      contents: write # for creating tag and release
      id-token: write # for generating build provenance
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
      - name: Generate build provenance
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: dist/*
      - name: Create bot token
        id: token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          permission-contents: write
      - name: Create tag
        run: |
          gh api "/repos/$GITHUB_REPOSITORY/git/refs" \
            -f "ref=refs/tags/v$VERSION" \
            -f "sha=$GITHUB_SHA"
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
          VERSION: ${{ needs.build.outputs.version }}
      - name: Create release
        run: |
          gh release create "v$VERSION" \
            --latest \
            --title "$VERSION" \
            --generate-notes \
            dist/*
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          VERSION: ${{ needs.build.outputs.version }}

  publish-pypi:
    name: Publish to PyPI
    needs: [build, release]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/owe/${{ needs.build.outputs.version }}/
    permissions:
      id-token: write # for authenticating to PyPI
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: false
      - name: Perform distribution checks
        run: uvx twine check --strict dist/*
      - name: Perform release checks
        run: uv publish --dry-run
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          attestations: true

  bump-homebrew-formula:
    name: Bump Homebrew formula
    needs: [build, release]
    runs-on: macos-latest
    environment:
      name: release
      deployment: false
    steps:
      - name: Create bot token
        id: token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: homebrew-tap
          permission-contents: write
          permission-pull-requests: write
      - name: Configure Git user
        run: |
          BOT_LOGIN="${APP_SLUG}[bot]"
          BOT_ID="$(gh api "/users/$BOT_LOGIN" --jq '.id')"
          {
            echo "HOMEBREW_GIT_NAME=$BOT_LOGIN"
            echo "HOMEBREW_GIT_EMAIL=$BOT_ID+$BOT_LOGIN@users.noreply.github.com"
          } >> "$GITHUB_ENV"
        env:
          APP_SLUG: ${{ steps.token.outputs.app-slug }}
          GH_TOKEN: ${{ steps.token.outputs.token }}
      - name: Bump Homebrew formula
        run: |
          brew tap zhongruoyu/tap
          brew bump-formula-pr --no-fork \
            --version "$VERSION" \
            zhongruoyu/tap/owe
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ steps.token.outputs.token }}
          VERSION: ${{ needs.build.outputs.version }}
