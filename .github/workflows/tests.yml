name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: tests-${{ github.event_name }}-${{ github.sha }}
  cancel-in-progress: true

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Run `ruff check`
        uses: astral-sh/ruff-action@v3
        with:
          src: ./src
      - name: Run `ruff format`
        run: ruff format --check --diff
