name: Build

on:
  workflow_call:
    inputs:
      cache:
        type: boolean
    outputs:
      version:
        value: ${{ jobs.build.outputs.version }}

permissions: {}

defaults:
  run:
    shell: bash -euxo pipefail {0}

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up uv
        # zizmor: ignore[cache-poisoning] We never use the cache for releases.
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: ${{ inputs.cache }}
      - name: Determine version
        id: version
        run: |
          version="$(uv version --short)"
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Run build
        run: |
          uv build --sdist --wheel
      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: iou-${{ steps.version.outputs.version }}
          path: dist/*

  test:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
    name: Test build (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: iou-${{ needs.build.outputs.version }}
      - name: Set up uv
        # zizmor: ignore[cache-poisoning] We never use the cache for releases.
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: ${{ inputs.cache }}
      - name: Run tests with sdist
        run: |
          uv run --isolated --no-project --with *.tar.gz --with pytest pytest
      - name: Run tests with wheel
        run: |
          uv run --isolated --no-project --with *.whl --with pytest pytest
