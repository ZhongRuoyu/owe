name: Build

on:
  workflow_call:
    inputs:
      cache:
        type: boolean
    outputs:
      version:
        value: ${{ jobs.build.outputs.version }}

permissions: {}

defaults:
  run:
    shell: bash -euxo pipefail {0}

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up uv
        # zizmor: ignore[cache-poisoning] We never use the cache for releases.
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: ${{ inputs.cache }}
      - name: Determine version
        id: version
        run: |
          version="$(uv version --short)"
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Run build
        run: |
          uv build --sdist --wheel --no-create-gitignore
      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: owe-${{ steps.version.outputs.version }}
          path: dist/*

  test:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
    name: Test build (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
      - name: Set up uv
        # zizmor: ignore[cache-poisoning] We never use the cache for releases.
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: ${{ inputs.cache }}
      - name: Run tests with sdist
        run: |
          uv run --isolated --no-project --with dist/*.tar.gz --with pytest pytest
      - name: Run tests with wheel
        run: |
          uv run --isolated --no-project --with dist/*.whl --with pytest pytest
