<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>IOU</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.8/css/bootstrap.min.css"
    integrity="sha512-2bBQCjcnw658Lho4nlXJcc6WkV/UxpE/sAokbXPxQNGqmNdQrWqtw26Ns9kFF/yG792pKR1Sx8/Y1Lf1XN4GKA=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
  <div class="container my-3">
    <h1>IOU</h1>

    <div id="alerts"></div>

    <nav>
      <div class="nav nav-tabs" id="nav-tab" role="tablist">
        <button class="nav-link active" id="nav-records-tab" data-bs-toggle="tab" data-bs-target="#nav-records"
          type="button" role="tab" aria-controls="nav-records" aria-selected="true">Records</button>
        <button class="nav-link" id="nav-new-record-tab" data-bs-toggle="tab" data-bs-target="#nav-new-record"
          type="button" role="tab" aria-controls="nav-new-record" aria-selected="false">Add Record</button>
        <button class="nav-link" id="nav-summary-tab" data-bs-toggle="tab" data-bs-target="#nav-summary" type="button"
          role="tab" aria-controls="nav-summary" aria-selected="false">Summary</button>
      </div>
    </nav>

    <div class="tab-content" id="nav-tabContent">
      <div class="tab-pane fade show active" id="nav-records" role="tabpanel" aria-labelledby="nav-records-tab"
        tabindex="0">
        <div class="table-responsive">
          <table class="table">
            <thead>
              <tr>
                <th></th>
                <th>Date</th>
                <th>Type</th>
                <th>Lender</th>
                <th>Borrower</th>
                <th>Amount</th>
                <th>Remarks</th>
              </tr>
            </thead>
            <tbody id="tbody-records">
            </tbody>
          </table>
        </div>
      </div>

      <div class="tab-pane fade" id="nav-new-record" role="tabpanel" aria-labelledby="nav-new-record-tab" tabindex="1">
        <form id="form-add-record">
          <div class="input-group my-3" id="type">
            <span class="input-group-text w-25">Type</span>
          </div>
          <div class="input-group my-3" id="lender">
            <span class="input-group-text w-25">Lender</span>
          </div>
          <div class="input-group my-3" id="borrower">
            <span class="input-group-text w-25">Borrower</span>
          </div>
          <div class="input-group mb-3">
            <span class="input-group-text w-25">Amount</span>
            <span class="input-group-text" id="input-currency-label">$</span>
            <input type="number" step="0.01" class="form-control" id="amount" required>
          </div>
          <div class="input-group mb-3">
            <span class="input-group-text w-25">Remarks</span>
            <input type="text" class="form-control" id="remarks" autocomplete="on">
          </div>
          <div class="input-group mb-3">
            <input type="submit" class="btn btn-primary" id="add" value="Add">
          </div>
        </form>
      </div>

      <div class="tab-pane fade" id="nav-summary" role="tabpanel" aria-labelledby="nav-summary-tab" tabindex="2">
        <table class="table">
          <thead>
            <tr>
              <th>Payment from</th>
              <th>Payment to</th>
              <th>Amount</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="tbody-summary">
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.8/js/bootstrap.min.js"
    integrity="sha512-nKXmKvJyiGQy343jatQlzDprflyB5c+tKCzGP3Uq67v+lmzfnZUi/ZT+fc6ITZfSC5HhaBKUIvr/nTLCV+7F+Q=="
    crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="main.js"></script>
</body>

</html>
