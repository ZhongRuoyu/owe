[project]
name = "iou"
version = "0.1.0"
license = "MIT"
license-files = ["LICENSE"]
requires-python = ">=3.13"
dependencies = [
  "flask>=3.1.3",
  "flask-cors>=6.0.2",
  "gunicorn>=26.0.0",
  "requests>=2.34.2",
]

[project.scripts]
iou-dump = "iou.scripts.iou_dump:main"
iou-users = "iou.scripts.iou_users:main"

[dependency-groups]
dev = ["ruff>=0.15.14", "ty>=0.0.39"]

[build-system]
requires = ["uv_build>=0.11.16"]
build-backend = "uv_build"

[tool.setuptools.package-data]
iou = ["static/**/*", "templates/**/*"]

[tool.uv]
exclude-newer = "P7D"

[tool.uv.build-backend]
module-name = "iou"
module-root = ""
